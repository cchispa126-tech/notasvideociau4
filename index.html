<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bloc de Notas Cloud - Multimedia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-mode {
            background: #1a1a2e;
            color: #eee;
        }
        body.dark-mode .config-panel,
        body.dark-mode .nota-form,
        body.dark-mode .nota-card {
            background: #2d2d44;
            color: #eee;
        }
        body.dark-mode .nota-titulo { color: #eee; }
        body.dark-mode .nota-contenido { color: #ccc; }
        body.dark-mode .status.info { background: #3a3a5a; color: #ddd; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .config-panel, .nota-form {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); background: #764ba2; }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .notas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .nota-card {
            background: white;
            padding: 18px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.3s;
        }
        .nota-card:hover { transform: translateY(-3px); }
        .nota-titulo {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        .nota-contenido { color: #555; margin-bottom: 12px; word-wrap: break-word; line-height: 1.5; }
        .nota-contenido a { color: #667eea; text-decoration: none; border-bottom: 1px solid #667eea; }
        .nota-fecha { font-size: 0.75em; color: #999; margin-top: 12px; }
        .btn-eliminar { background: #dc3545; padding: 8px 16px; font-size: 13px; margin-top: 8px; }
        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: #28a745; }
        .sync-dot.syncing { background: #ffc107; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .empty-state { text-align: center; color: white; padding: 50px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        footer { text-align: center; margin-top: 30px; color: white; opacity: 0.7; font-size: 12px; }
        .btn-email { background: #17a2b8; }
        .btn-audio { background: #ff4757; }
        .btn-video { background: #28a745; }
        .btn-youtube { background: #ff0000; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 Bloc de Notas Cloud</h1>
        <p>Imágenes | Vídeos | Audio | Modo oscuro | Exportación</p>
    </div>

    <div class="config-panel">
        <h3>⚙️ Configuración de GitHub</h3>
        <div class="config-group">
            <label>🔑 GitHub Token:</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        </div>
        <div class="config-group">
            <label>📁 ID del Gist:</label>
            <input type="text" id="gistId" placeholder="Déjalo vacío para crear uno nuevo">
        </div>
        <div class="config-group">
            <label>👤 Tu apodo (aparecerá en tus notas):</label>
            <input type="text" id="apodo" placeholder="Ej: Juan, María, Admin">
        </div>
        <div class="config-group">
            <label>📧 Gestión de notificaciones por correo:</label>
            <div class="btn-group">
                <button id="btnAddEmail" style="background: #17a2b8;">➕ Añadir correo</button>
                <button id="activarNotificaciones" style="background: #28a745;">🔔 Activar notificaciones</button>
                <button id="desactivarNotificaciones" style="background: #ffc107;">🔕 Desactivar notificaciones</button>
                <button id="borrarCorreo" style="background: #dc3545;">🗑️ Borrar mi correo</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-sync" onclick="guardarConfiguracion()">💾 Guardar</button>
            <button onclick="sincronizarDesdeGitHub()">📥 Sincronizar ahora</button>
            <button onclick="subirAGitHub()">📤 Subir a GitHub</button>
            <button onclick="toggleModoOscuro()" style="background: #6c757d;">🌙 Modo oscuro</button>
            <button id="btnGuardarApodo" style="background: #28a745;">💾 Guardar apodo</button>
        </div>
        <div id="statusMessage" class="status info">✅ Listo</div>
    </div>

    <div class="nota-form">
        <input type="text" id="titulo" placeholder="📌 Título">
        <textarea id="contenido" placeholder="✍️ Escribe aquí..."></textarea>
        <div class="btn-group">
            <button onclick="guardarNota()">💾 Guardar Nota</button>
            <button onclick="pegarYCerrar()" style="background: #17a2b8;">📋 Pegar, guardar y cerrar</button>
            <button onclick="cerrarVentana()" style="background: #6c757d;">❌ Cerrar</button>
            <button onclick="subirImagen()" style="background: #28a745;">🖼️ Subir imagen (Imgur)</button>
            <button onclick="exportarHTML()" style="background: #dc3545;">📄 Exportar a HTML</button>
            <button onclick="grabarAudio()" class="btn-audio">🎤 Grabar audio</button>
            <button onclick="grabarVideo()" class="btn-video">🎥 Grabar vídeo</button>
            <button onclick="subirYouTube()" class="btn-youtube">📹 Subir a YouTube</button>
        </div>
    </div>

    <div id="notas-container" class="notas-grid"></div>
    <footer>🔗 Usa: ?token=TOKEN&gist=GIST_ID | 🌙 Modo oscuro | 🎤 Audio | 🎥 Vídeos | 📹 YouTube</footer>
</div>

<div class="sync-indicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncStatus">Local</span>
</div>

<script>
    let notas = [];
    let config = { token: '', gistId: '' };

    function isPC() { return window.innerWidth >= 1024; }

    function toggleModoOscuro() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('modo_oscuro', document.body.classList.contains('dark-mode'));
        mostrarStatus(document.body.classList.contains('dark-mode') ? '🌙 Modo oscuro activado' : '☀️ Modo claro activado', 'info');
    }

    function cargarModoOscuro() {
        if (localStorage.getItem('modo_oscuro') === 'true') document.body.classList.add('dark-mode');
    }

    function cargarParametrosURL() {
        const urlParams = new URLSearchParams(window.location.search);
        const tokenURL = urlParams.get('token');
        const gistURL = urlParams.get('gist');
        if (tokenURL) {
            document.getElementById('githubToken').value = tokenURL;
            config.token = tokenURL;
            localStorage.setItem('github_token', tokenURL);
            mostrarStatus('✅ Token cargado desde enlace', 'success');
        }
        if (gistURL) {
            document.getElementById('gistId').value = gistURL;
            config.gistId = gistURL;
            localStorage.setItem('github_gist_id', gistURL);
            mostrarStatus('✅ Gist cargado desde enlace', 'success');
        }
        if (config.token && config.gistId) setTimeout(() => sincronizarDesdeGitHub(), 1000);
    }

    function guardarApodo() {
        const apodo = document.getElementById('apodo').value.trim();
        if (apodo) {
            localStorage.setItem('mi_apodo', apodo);
            mostrarStatus('✅ Apodo guardado: ' + apodo, 'success');
        } else {
            localStorage.removeItem('mi_apodo');
            mostrarStatus('ℹ️ Apodo eliminado, las notas aparecerán como "Anónimo"', 'info');
        }
    }

    function cargarApodo() {
        const apodoGuardado = localStorage.getItem('mi_apodo');
        if (apodoGuardado) {
            document.getElementById('apodo').value = apodoGuardado;
        }
    }

    async function subirImagen() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.style.display = 'none';
        
        input.onchange = async function(event) {
            const file = event.target.files[0];
            if (!file) return;
            mostrarStatus('📤 Subiendo imagen a Imgur...', 'info');
            if (file.size > 10 * 1024 * 1024) {
                mostrarStatus('❌ La imagen es muy grande (máx 10MB)', 'error');
                document.body.removeChild(input);
                return;
            }
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    const imageUrl = data.data.link;
                    const textarea = document.getElementById('contenido');
                    textarea.value += `\n📸 ${imageUrl}\n`;
                    mostrarStatus('✅ Imagen subida a Imgur', 'success');
                } else mostrarStatus('❌ Error al subir', 'error');
            } catch (error) { mostrarStatus('❌ Error de conexión', 'error'); }
            document.body.removeChild(input);
        };
        document.body.appendChild(input);
        input.click();
    }

    function grabarAudio() {
        const opcion = confirm('¿Usar Internet Archive (permanente)?\n\nOK = Archive (requiere cuenta gratis)\nCancelar = Vocaroo (sin cuenta, audio temporal)');
        if (opcion) {
            window.open('https://archive.org/audio/', '_blank');
            alert('🎤 1. Crea cuenta en Internet Archive (gratis)\n2. Sube o graba tu audio\n3. Copia el enlace\n4. Pégalo en la nota');
        } else {
            window.open('https://vocaroo.com/', '_blank');
            alert('🎤 1. Graba tu audio\n2. Copia el enlace\n3. Pégalo en la nota');
        }
    }

    function grabarVideo() {
        window.location.href = 'intent://#Intent;scheme=content;package=com.google.android.GoogleCamera;end';
        alert('🎥 1. Graba el vídeo con la cámara\n2. Se guardará en tu galería\n\n📹 Luego usa "Subir a YouTube" para compartirlo');
    }

    function subirYouTube() {
        window.open('https://www.youtube.com/upload', '_blank');
        alert('📹 CÓMO SUBIR EL VÍDEO:\n\n1. Sube el vídeo que acabas de grabar\n2. Espera a que se procese\n3. Copia el enlace\n4. Vuelve a esta nota y pega el enlace\n\n✅ El vídeo se verá automáticamente');
    }

    function convertirContenido(texto) {
        let textoHtml = escapeHtml(texto);
        // YouTube
        textoHtml = textoHtml.replace(/(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/g, (match, p1, p2, p3, id) => {
            const url = `https://www.youtube.com/watch?v=${id}`;
            const miniatura = `https://img.youtube.com/vi/${id}/0.jpg`;
            return `<div style="margin: 10px 0; text-align: center;">
                        <a href="${url}" target="_blank">
                            <img src="${miniatura}" alt="Miniatura" style="max-width: 100%; border-radius: 10px; max-width: 300px;">
                        </a>
                        <div><a href="${url}" target="_blank">🎬 Ver vídeo</a></div>
                    </div>`;
        });
        // Imágenes
        textoHtml = textoHtml.replace(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)(\?[^\s]*)?)/gi, (url) => {
            let urlLimpia = url.split('?')[0];
            return `<div style="margin: 10px 0;">
                        <img src="${urlLimpia}" alt="imagen" style="max-width: 100%; border-radius: 10px;" onclick="window.open('${url}', '_blank')">
                        <div><a href="${url}" target="_blank">🔗 Abrir imagen</a></div>
                    </div>`;
        });
        // Enlaces normales
        textoHtml = textoHtml.replace(/(https?:\/\/[^\s]+)/g, (url) => {
            if (url.includes('youtube.com') || url.includes('youtu.be') || url.match(/\.(jpg|jpeg|png|gif|webp)/i)) return url;
            return `<a href="${url}" target="_blank">${url}</a>`;
        });
        textoHtml = textoHtml.replace(/\n/g, '<br>');
        return textoHtml;
    }

    function exportarHTML() {
        if (notas.length === 0) { mostrarStatus('❌ No hay notas para exportar', 'error'); return; }
        
        let contenido = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mis Notas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .nota { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .nota h3 { margin-top: 0; color: #667eea; }
        .autor { color: #666; border-left: 3px solid #667eea; padding-left: 10px; margin: 10px 0; }
        .fecha { color: #999; font-size: 0.8em; margin-top: 10px; }
        img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        a { color: #667eea; }
        .video-container, .image-container { margin: 15px 0; text-align: center; }
    </style>
</head>
<body>
<h1>📝 Mis Notas</h1>
<div>Exportado el: ${new Date().toLocaleString()}</div>
<hr>`;
        
        notas.forEach(n => {
            let contenidoNota = n.contenido || '';
            
            // YouTube
            contenidoNota = contenidoNota.replace(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/g, (match, id) => {
                const miniatura = `https://img.youtube.com/vi/${id}/0.jpg`;
                const url = `https://www.youtube.com/watch?v=${id}`;
                return `<div class="video-container">
                            <a href="${url}" target="_blank">
                                <img src="${miniatura}" alt="Miniatura" style="max-width: 300px; border-radius: 10px;">
                            </a>
                            <div><a href="${url}" target="_blank">🎬 Ver vídeo</a></div>
                        </div>`;
            });
            
            // Imágenes
            contenidoNota = contenidoNota.replace(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)(\?[^\s]*)?)/gi, (url) => {
                let urlLimpia = url.split('?')[0];
                return `<div class="image-container">
                            <img src="${urlLimpia}" alt="imagen" style="max-width: 100%; border-radius: 10px;" 
                                 onclick="window.open('${url}', '_blank')" onerror="this.style.display='none'">
                            <div><a href="${url}" target="_blank">🔗 Ver imagen</a></div>
                        </div>`;
            });
            
            // Enlaces normales
            contenidoNota = contenidoNota.replace(/(https?:\/\/[^\s]+)/g, (url) => {
                if (url.includes('youtube.com') || url.includes('youtu.be') || url.match(/\.(jpg|jpeg|png|gif|webp)/i)) return url;
                if (url.startsWith('<') || url.includes('"')) return url;
                return `<a href="${url}" target="_blank">${url}</a>`;
            });
            
            contenidoNota = contenidoNota.replace(/\n/g, '<br>');
            
            contenido += `
                <div class="nota">
                    <h3>${escapeHtml(n.titulo || 'Sin título')}</h3>
                    <div class="autor">👤 ${escapeHtml(n.autor || 'Anónimo')}</div>
                    <div>${contenidoNota}</div>
                    <div class="fecha">📅 ${n.fecha || ''}</div>
                </div>
            `;
        });
        
        contenido += `<hr><div>Generado desde Bloc de Notas Cloud</div></body></html>`;
        
        const blob = new Blob([contenido], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mis_notas_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        mostrarStatus('✅ Archivo HTML generado', 'success');
    }

    function pegarYCerrar() {
        navigator.clipboard.readText().then(texto => {
            if (texto && texto.trim() !== '') {
                document.getElementById('contenido').value = texto;
                guardarNota();
                setTimeout(() => window.close(), 500);
            } else mostrarStatus('❌ No hay nada copiado', 'error');
        }).catch(() => mostrarStatus('❌ No se pudo leer el portapapeles', 'error'));
    }

    function cerrarVentana() { if (confirm('¿Cerrar esta pestaña?')) window.close(); }

    function cargarConfiguracion() {
        cargarParametrosURL();
        const savedToken = localStorage.getItem('github_token');
        const savedGistId = localStorage.getItem('github_gist_id');
        if (savedToken && !config.token) { document.getElementById('githubToken').value = savedToken; config.token = savedToken; }
        if (savedGistId && !config.gistId) { document.getElementById('gistId').value = savedGistId; config.gistId = savedGistId; }
        cargarNotasLocales();
        if (config.token && config.gistId) sincronizarDesdeGitHub();
        cargarModoOscuro();
        cargarApodo();
    }

    function guardarConfiguracion() {
        config.token = document.getElementById('githubToken').value;
        config.gistId = document.getElementById('gistId').value;
        if (config.token) localStorage.setItem('github_token', config.token);
        if (config.gistId) localStorage.setItem('github_gist_id', config.gistId);
        mostrarStatus('✅ Configuración guardada', 'success');
    }

    function cargarNotasLocales() {
        const notasGuardadas = localStorage.getItem('blocNotas');
        if (notasGuardadas) { notas = JSON.parse(notasGuardadas); mostrarNotas(); }
    }

    function guardarNota() {
        const titulo = document.getElementById('titulo').value;
        const contenido = document.getElementById('contenido').value;
        const autor = localStorage.getItem('mi_apodo') || 'Anónimo';
        if (!titulo && !contenido) return alert('📝 Escribe algo');
        const nota = { id: Date.now(), autor: autor, titulo: titulo || 'Sin título', contenido: contenido, fecha: new Date().toLocaleString(), timestamp: Date.now() };
        notas.unshift(nota);
        guardarNotasLocales();
        document.getElementById('titulo').value = '';
        document.getElementById('contenido').value = '';
        mostrarNotas();
        actualizarSyncStatus('local');
        mostrarStatus('✅ Nota guardada', 'success');
        if (config.token && config.gistId) subirAGitHub();
    }

    function guardarNotasLocales() { localStorage.setItem('blocNotas', JSON.stringify(notas)); }
    function eliminarNota(id) { if (confirm('¿Eliminar esta nota?')) { notas = notas.filter(n => n.id !== id); guardarNotasLocales(); mostrarNotas(); actualizarSyncStatus('local'); mostrarStatus('🗑️ Nota eliminada', 'info'); if (config.token && config.gistId) subirAGitHub(); } }

    async function subirAGitHub() {
        if (!config.token) return;
        actualizarSyncStatus('syncing');
        const data = { description: 'Mis notas', public: false, files: { 'notas.json': { content: JSON.stringify(notas, null, 2) } } };
        try {
            let url = 'https://api.github.com/gists', method = 'POST';
            if (config.gistId) { url = `https://api.github.com/gists/${config.gistId}`; method = 'PATCH'; }
            const response = await fetch(url, { method, headers: { 'Authorization': `token ${config.token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            const result = await response.json();
            if (response.ok) {
                if (!config.gistId && result.id) { config.gistId = result.id; localStorage.setItem('github_gist_id', result.id); document.getElementById('gistId').value = result.id; }
                actualizarSyncStatus('synced');
            } else throw new Error(result.message);
        } catch (error) { actualizarSyncStatus('error'); }
    }

    async function sincronizarDesdeGitHub() {
        if (!config.token || !config.gistId) return;
        actualizarSyncStatus('syncing');
        try {
            const response = await fetch(`https://api.github.com/gists/${config.gistId}`, { headers: { 'Authorization': `token ${config.token}` } });
            if (response.ok) {
                const gist = await response.json();
                const notasContent = gist.files['notas.json']?.content;
                if (notasContent) {
                    const notasNube = JSON.parse(notasContent);
                    const idsExistentes = new Set(notas.map(n => n.id));
                    const nuevas = notasNube.filter(n => !idsExistentes.has(n.id));
                    if (nuevas.length > 0) {
                        notas = [...nuevas, ...notas];
                        guardarNotasLocales();
                        mostrarNotas();
                        mostrarStatus(`🔄 ${nuevas.length} notas nuevas`, 'success');
                    } else actualizarSyncStatus('synced');
                }
            }
        } catch (error) { actualizarSyncStatus('error'); }
    }

    function mostrarNotas() {
        const container = document.getElementById('notas-container');
        if (notas.length === 0) { container.innerHTML = '<div class="empty-state">✨ No hay notas. ¡Crea tu primera nota!</div>'; return; }
        container.innerHTML = notas.map(nota => `<div class="nota-card"><div class="nota-titulo">${escapeHtml(nota.titulo)}</div><div class="nota-contenido"><b>👤 ${escapeHtml(nota.autor || 'Anónimo')}</b><br><br>${convertirContenido(nota.contenido)}</div><div class="nota-fecha">📅 ${nota.fecha}</div><button class="btn-eliminar" onclick="eliminarNota(${nota.id})">🗑️ Eliminar</button></div>`).join('');
    }

    function mostrarStatus(mensaje, tipo) {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.textContent = mensaje;
        statusDiv.className = `status ${tipo}`;
        setTimeout(() => { if (statusDiv.textContent === mensaje) { statusDiv.className = 'status info'; statusDiv.textContent = '✅ Listo'; } }, 3000);
    }

    function actualizarSyncStatus(estado) {
        const dot = document.getElementById('syncDot');
        const status = document.getElementById('syncStatus');
        switch(estado) {
            case 'syncing': dot.className = 'sync-dot syncing'; status.textContent = 'Sincronizando...'; break;
            case 'synced': dot.className = 'sync-dot'; dot.style.background = '#28a745'; status.textContent = 'Sincronizado ☁️'; break;
            case 'local': dot.className = 'sync-dot'; dot.style.background = '#ffc107'; status.textContent = 'Solo local 💾'; break;
            case 'error': dot.className = 'sync-dot'; dot.style.background = '#dc3545'; status.textContent = 'Error'; break;
        }
    }

    function escapeHtml(text) { 
        if (!text) return '';
        const div = document.createElement('div'); 
        div.textContent = text; 
        return div.innerHTML; 
    }

    // ============================================
    // GESTIÓN DE NOTIFICACIONES (activar/desactivar/borrar)
    // ============================================

    async function actualizarEstadoNotificaciones(email, activo) {
        const token = config.token || localStorage.getItem('github_token');
        const gistId = config.gistId || localStorage.getItem('github_gist_id');
        if (!token || !gistId) {
            alert('⚠️ Configura primero tu GitHub Token y Gist ID');
            return false;
        }
        
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const gist = await response.json();
            let emails = [];
            if (gist.files['emails.json']?.content) {
                emails = JSON.parse(gist.files['emails.json'].content);
            }
            
            let encontrado = false;
            const nuevosEmails = emails.map(item => {
                if (typeof item === 'string') {
                    if (item === email) {
                        encontrado = true;
                        return { email: email, activo: activo };
                    }
                    return { email: item, activo: true };
                } else if (item.email === email) {
                    encontrado = true;
                    return { ...item, activo: activo };
                }
                return item;
            });
            
            if (!encontrado) {
                alert('❌ No se encontró tu correo en la lista. Añádelo primero.');
                return false;
            }
            
            await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        'emails.json': { content: JSON.stringify(nuevosEmails, null, 2) }
                    }
                })
            });
            
            return true;
        } catch (error) {
            alert('❌ Error: ' + error.message);
            return false;
        }
    }

    async function activarMisNotificaciones() {
        const email = prompt('📧 Introduce tu correo para ACTIVAR las notificaciones:');
        if (!email || !email.includes('@')) return;
        const resultado = await actualizarEstadoNotificaciones(email, true);
        if (resultado) alert('✅ Notificaciones activadas. Volverás a recibir avisos.');
    }

    async function desactivarMisNotificaciones() {
        const email = prompt('📧 Introduce tu correo para DESACTIVAR las notificaciones temporalmente:');
        if (!email || !email.includes('@')) return;
        const resultado = await actualizarEstadoNotificaciones(email, false);
        if (resultado) alert('🔕 Notificaciones desactivadas. No recibirás avisos hasta que las reactives.');
    }

    async function borrarMiCorreo() {
        const email = prompt('📧 Introduce tu correo para ELIMINARLO de la lista:');
        if (!email || !email.includes('@')) return;
        
        const token = config.token || localStorage.getItem('github_token');
        const gistId = config.gistId || localStorage.getItem('github_gist_id');
        if (!token || !gistId) {
            alert('⚠️ Configura primero tu GitHub Token y Gist ID');
            return;
        }
        
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const gist = await response.json();
            let emails = [];
            if (gist.files['emails.json']?.content) {
                emails = JSON.parse(gist.files['emails.json'].content);
            }
            
            const nuevosEmails = emails.filter(item => {
                if (typeof item === 'string') return item !== email;
                return item.email !== email;
            });
            
            await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: {
                        'emails.json': { content: JSON.stringify(nuevosEmails, null, 2) }
                    }
                })
            });
            alert('🗑️ Correo eliminado. Ya no recibirás más notificaciones.');
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }

    async function añadirCorreo() {
        const email = prompt('📧 Introduce tu correo para recibir notificaciones:');
        if (!email || !email.includes('@')) {
            alert('❌ Correo no válido');
            return;
        }
        
        const token = config.token || localStorage.getItem('github_token');
        const gistId = config.gistId || localStorage.getItem('github_gist_id');
        
        if (!token || !gistId) {
            alert('⚠️ Primero configura tu GitHub Token y Gist ID en el panel de configuración');
            return;
        }
        
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const gist = await response.json();
            let emails = [];
            if (gist.files['emails.json']?.content) {
                emails = JSON.parse(gist.files['emails.json'].content);
            }
            
            // Normalizar: convertir strings a objetos si es necesario
            const emailsNormalizados = emails.map(item => {
                if (typeof item === 'string') return { email: item, activo: true };
                return item;
            });
            
            if (!emailsNormalizados.some(item => item.email === email)) {
                emailsNormalizados.push({ email: email, activo: true });
                await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            'emails.json': { content: JSON.stringify(emailsNormalizados, null, 2) }
                        }
                    })
                });
                alert(`✅ Correo ${email} añadido correctamente. Recibirás notificaciones.`);
            } else {
                alert('ℹ️ Este correo ya estaba en la lista');
            }
        } catch (error) {
            alert('❌ Error al guardar el correo: ' + error.message);
        }
    }

    document.getElementById('btnGuardarApodo').onclick = guardarApodo;
    document.getElementById('btnAddEmail').onclick = añadirCorreo;
    document.getElementById('activarNotificaciones').onclick = activarMisNotificaciones;
    document.getElementById('desactivarNotificaciones').onclick = desactivarMisNotificaciones;
    document.getElementById('borrarCorreo').onclick = borrarMiCorreo;

    window.addEventListener('resize', function() { mostrarNotas(); });
    document.addEventListener('keydown', function(e) { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); guardarNota(); } });
    document.addEventListener('DOMContentLoaded', function() { const campoTexto = document.getElementById('contenido'); if (campoTexto) campoTexto.focus(); });

    setInterval(() => { if (config.token && config.gistId) sincronizarDesdeGitHub(); }, 30000);
    document.addEventListener('visibilitychange', function() { if (!document.hidden && config.token && config.gistId) sincronizarDesdeGitHub(); });

    cargarConfiguracion();
</script>
